<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenida</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6fb;
      }

      .welcome-card {
        text-align: center;
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        width: min(90vw, 400px);
      }

      h1 {
        margin-top: 0;
      }

      button {
        padding: 0.75rem 1.25rem;
        border: none;
        border-radius: 8px;
        background: #2463eb;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #1f54c7;
      }

      #message {
        margin-top: 1rem;
        font-weight: bold;
        color: #1f2937;
      }
    </style>
  </head>
  <body>
    <main class="welcome-card">
      <h1>Bienvenido</h1>
      <p>Presiona el botón para recibir un saludo.</p>
      <button id="greetBtn" type="button">saluda</button>
      <p id="message" aria-live="polite"></p>
    </main>

    <script>
      const greetButton = document.getElementById('greetBtn');
      const message = document.getElementById('message');

      greetButton.addEventListener('click', () => {
        message.textContent = 'hola mundo!';
      });
    </script>
  </body>
</html>
